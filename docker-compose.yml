x-common: &common
  env_file: .env
  restart: unless-stopped

services:
  # smp:
  #   <<: *common
  #   image: itzg/minecraft-server:latest
  #   environment:
  #     PATCH_DEFINITIONS: /patches
  #     TYPE: "PAPER"
  #     ONLINE_MODE: "FALSE"
  #     ENFORCE_SECURE_PROFILE: "FALSE"
  #     NETWORK_COMPRESSION_THRESHOLD: "-1"
  #     INIT_MEMORY: "1G"
